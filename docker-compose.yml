version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: money-engine-ai
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
    env_file:
      - .env.local
    volumes:
      - db-data:/app/data

volumes:
  db-data:
