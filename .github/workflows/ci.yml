name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build, Test & Validate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:ci.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Prepare test database
        run: npm run db:push

      - name: Run tests
        run: npm run test

      - name: Run production build
        run: npm run build
